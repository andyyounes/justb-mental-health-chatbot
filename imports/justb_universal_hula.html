
<style>

      <!-- Ring gradients — bright white/silver like Universal -->
      <linearGradient id="rA" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#a090d0" stop-opacity="0"/>
        <stop offset="18%" stop-color="#ffffff" stop-opacity="1"/>

        <stop offset="80%" stop-color="#e8e0ff" stop-opacity="0.9"/>

        <stop offset="22%" stop-color="#c8c0e8" stop-opacity="0.8"/>
        <stop offset="50%" stop-color="#e0d8f8" stop-opacity="0.88"/>
        <stop offset="78%" stop-color="#c8c0e8" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#6050b0" stop-opacity="0"/>
      </linearGradient>

      <!-- Hula hoop tilt: TOP goes behind, BOTTOM comes in front -->
      <clipPath id="topHalf">
        <rect x="0" y="0" width="320" height="160"/>
      </clipPath>
      <clipPath id="bottomHalf">
        <rect x="0" y="160" width="320" height="160"/>
      </clipPath>
      <clipPath id="outsidePlanet">
        <path d="M0 0 H320 V320 H0 Z M160 158 m-84 0 a84 84 0 1 0 168 0 a84 84 0 1 0 -168 0"/>

    <!-- Dense star field -->

    <circle cx="48" cy="12" r="0.7" fill="white" opacity="0.7"/>

    <circle cx="295" cy="228" r="0.8" fill="#c4b0f7" opacity="0.6"/>
    <circle cx="275" cy="268" r="1.5" fill="white" opacity="0.85"/>
    <circle cx="238" cy="295" r="0.8" fill="white" opacity="0.7"/>
    <circle cx="192" cy="308" r="1" fill="#c4b0f7" opacity="0.6"/>
    <circle cx="145" cy="312" r="0.7" fill="white" opacity="0.8"/>
    <circle cx="98" cy="302" r="1.2" fill="white" opacity="0.7"/>

    <circle cx="12" cy="115" r="0.7" fill="white" opacity="0.75"/>
    <circle cx="22" cy="72" r="1" fill="white" opacity="0.65"/>
    <!-- Mid field stars -->
    <circle cx="65" cy="65" r="0.6" fill="#ede0ff" opacity="0.7"/>
    <circle cx="255" cy="55" r="0.6" fill="#c4b0f7" opacity="0.65"/>
    <circle cx="272" cy="255" r="0.7" fill="#ede0ff" opacity="0.6"/>
    <circle cx="52" cy="258" r="0.6" fill="#c4b0f7" opacity="0.6"/>
    <circle cx="160" cy="18" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="160" cy="302" r="0.7" fill="white" opacity="0.5"/>

    <!-- 4-point stars scattered -->
    <path d="M262 35 L264 41 L270 43 L264 45 L262 51 L260 45 L254 43 L260 41Z" fill="white" opacity="0.9"/>
    <path d="M48 268 L50 274 L56 276 L50 278 L48 284 L46 278 L40 276 L46 274Z" fill="#c4b0f7" opacity="0.85"/>
    <path d="M298 148 L299.5 153 L305 155 L299.5 157 L298 162 L296.5 157 L291 155 L296.5 153Z" fill="white" opacity="0.75"/>
    <path d="M18 148 L19.5 153 L25 155 L19.5 157 L18 162 L16.5 157 L11 155 L16.5 153Z" fill="#a484e8" opacity="0.7"/>

    <!-- Aura glow -->
    <ellipse cx="160" cy="158" rx="118" ry="115" fill="url(#glw)"/>

    <!-- ══ STEP 1: TOP halves of rings go BEHIND planet ══ -->
    <g clip-path="url(#topHalf)" opacity="0.42">

    </g>

    <g clip-path="url(#bottomHalf)">
      <ellipse cx="160" cy="158" rx="148" ry="44" fill="none" stroke="url(#rC)" stroke-width="3.5" opacity="0.78"/>
      <ellipse cx="160" cy="158" rx="128" ry="36" fill="none" stroke="url(#rB)" stroke-width="6" opacity="0.9"/>
      <ellipse cx="160" cy="158" rx="110" ry="30" fill="none" stroke="url(#rA)" stroke-width="9" opacity="0.98"/>
    </g>

    <!-- Left/right extensions outside planet, top half — bright ends -->
    <g clip-path="url(#outsidePlanet)">
      <g clip-path="url(#topHalf)">
        <ellipse cx="160" cy="158" rx="148" ry="44" fill="none" stroke="url(#rC)" stroke-width="3.5" opacity="0.82"/>
        <ellipse cx="160" cy="158" rx="128" ry="36" fill="none" stroke="url(#rB)" stroke-width="6" opacity="0.92"/>
        <ellipse cx="160" cy="158" rx="110" ry="30" fill="none" stroke="url(#rA)" stroke-width="9" opacity="0.96"/>
      </g>
    </g>

    <!-- ══ STEP 4: JUSTB text across the BOTTOM front ring ══ -->
    <!-- Text spans the full front-facing bottom portion — Universal style -->
    <g clip-path="url(#bottomHalf)">
      <path id="textPath1" d="M52 158 Q160 202 268 158" fill="none"/>
      <text font-family="'Black Ops One', sans-serif" font-size="17" letter-spacing="14" fill="white" opacity="0.98">
        <textPath href="#textPath1" startOffset="8%">J U S T B</textPath>
      </text>

    <!-- Orbiting particles -->
    <circle cx="80" cy="118" r="4" fill="#c4b0f7" opacity="0.7"/>
    <circle cx="242" cy="108" r="3.5" fill="#a484e8" opacity="0.65"/>
    <circle cx="228" cy="210" r="4" fill="#c4b0f7" opacity="0.55"/>

  <!-- Light version -->

      <!-- Stars -->

      <!-- Back top rings -->
      <g clip-path="url(#th2)" opacity="0.38">
        <ellipse cx="55" cy="54" rx="51" ry="15" fill="none" stroke="url(#rl2)" stroke-width="3"/>
        <ellipse cx="55" cy="54" rx="42" ry="12" fill="none" stroke="url(#rl1)" stroke-width="5"/>

      <!-- Planet -->

      <circle cx="46" cy="44" r="9" fill="white" opacity="0.13"/>
      <circle cx="42" cy="40" r="4.5" fill="white" opacity="0.22"/>

        <ellipse cx="55" cy="54" rx="42" ry="12" fill="none" stroke="url(#rl1)" stroke-width="5" opacity="0.98"/>
      </g>
      <!-- Top outside extensions -->
      <g clip-path="url(#op2)">
        <g clip-path="url(#th2)">

    <div style="font-family:'Black Ops One',sans-serif;font-size:18px;color:#4a3a8a;letter-spacing:5px;">JUSTB</div>
